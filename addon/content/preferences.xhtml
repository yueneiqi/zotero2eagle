<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>

<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <!-- Eagle Integration Settings (grouped) -->
  <hbox class="z2e-section">
    <html:label
      class="z2e-section-title"
      data-l10n-id="pref-eagle-section"
    ></html:label>
  </hbox>
  <hbox class="z2e-divider"></hbox>

  <!-- Eagle API URL -->
  <hbox class="z2e-row">
    <html:label
      class="z2e-label"
      for="zotero-prefpane-__addonRef__-api-url"
      data-l10n-id="pref-api-url"
    ></html:label>
    <vbox class="z2e-control">
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-api-url"
        preference="eagleApiUrl"
        placeholder="http://localhost:41595"
      ></html:input>
      <html:div class="z2e-help" data-l10n-id="pref-api-url-help"></html:div>
    </vbox>
  </hbox>

  <!-- Eagle API Token -->
  <hbox class="z2e-row">
    <html:label
      class="z2e-label"
      for="zotero-prefpane-__addonRef__-api-token"
      data-l10n-id="pref-api-token"
    ></html:label>
    <vbox class="z2e-control">
      <html:input
        type="password"
        id="zotero-prefpane-__addonRef__-api-token"
        preference="eagleApiToken"
        placeholder="Enter your Eagle API token"
      ></html:input>
      <html:div class="z2e-help" data-l10n-id="pref-api-token-help"></html:div>
    </vbox>
  </hbox>

  <!-- Enable Eagle Integration -->
  <hbox class="z2e-row">
    <hbox class="z2e-checkbox">
      <html:input
        type="checkbox"
        id="zotero-prefpane-__addonRef__-enable-eagle"
        preference="enableEagleIntegration"
      ></html:input>
      <html:label
        for="zotero-prefpane-__addonRef__-enable-eagle"
        data-l10n-id="pref-enable-eagle"
      ></html:label>
    </hbox>
  </hbox>
  <hbox class="z2e-row-tight">
    <html:div class="z2e-help" data-l10n-id="pref-enable-eagle-help"></html:div>
  </hbox>

  <!-- Eagle Folder ID -->
  <hbox class="z2e-row">
    <html:label
      class="z2e-label"
      for="zotero-prefpane-__addonRef__-eagle-folder"
      data-l10n-id="pref-eagle-folder"
    ></html:label>
    <vbox class="z2e-control">
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-eagle-folder"
        preference="eagleFolderId"
        placeholder="Optional: Eagle folder ID"
      ></html:input>
      <html:div
        class="z2e-help"
        data-l10n-id="pref-eagle-folder-help"
      ></html:div>
    </vbox>
  </hbox>

  <!-- Test Connection Button -->
  <hbox class="z2e-row">
    <hbox class="z2e-actions">
      <html:button
        id="__addonRef__-test-connection"
        data-l10n-id="pref-test-connection"
      ></html:button>
      <html:span id="__addonRef__-connection-status"></html:span>
    </hbox>
  </hbox>
  <hbox class="z2e-divider"></hbox>

  <!-- Local Backup Settings -->
  <hbox class="z2e-section">
    <html:label class="z2e-section-title">Local Backup</html:label>
  </hbox>
  <hbox class="z2e-divider"></hbox>

  <!-- Output Directory -->
  <hbox class="z2e-row">
    <html:label
      class="z2e-label"
      for="zotero-prefpane-__addonRef__-output-dir"
      data-l10n-id="pref-output-dir"
    ></html:label>
    <vbox class="z2e-control">
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-output-dir"
        preference="outputDirectory"
        placeholder="Optional: Local backup directory"
      ></html:input>
      <html:div class="z2e-help" data-l10n-id="pref-output-dir-help"></html:div>
    </vbox>
  </hbox>
</groupbox>

<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>

<html:style
  ><![CDATA[ /* Scoped to zotero2eagle preferences only */ /* Row layout using
  XUL boxes */ .z2e-row { margin: 10px 0; } .z2e-row-tight { margin: 4px 0 10px;
  } .z2e-label { width: 160px; text-align: start; padding: 6px 12px 0 0;
  font-weight: 500; font-size: 14px; } .z2e-control { max-width: 520px; }
  .z2e-help { font-size: 12px; margin-top: 4px; line-height: 1.4; font-style:
  italic; max-width: 520px; opacity: .8; } /* Inputs */
  html|input[id*="__addonRef__"] { width: 420px; padding: 6px 8px; font-size:
  14px; box-sizing: border-box; } html|input[id*="__addonRef__"]:focus {
  outline: none; } /* Section header */ .z2e-section-title { font-weight: 700;
  font-size: 15px; } .z2e-divider { height: 1px; background: currentColor;
  opacity: .15; margin: 6px 0 12px; } /* Actions and buttons */ .z2e-actions {
  align-items: center; margin-top: 6px; } html|button[id*="__addonRef__"] {
  display: inline-flex; align-items: center; justify-content: center; padding:
  10px 16px; background: #0060df; color: #fff !important; border: none;
  border-radius: 4px; font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: background-color 0.2s ease; line-height: 1;
  white-space: nowrap; } html|button[id*="__addonRef__"]:hover {
  background: #0054c2; } html|button[id*="__addonRef__"]:active {
  background: #003eaa; } html|button[id*="__addonRef__"]:disabled { opacity:
  .6; cursor: not-allowed; } /* Status text */ html|span[id*="__addonRef__"][id*="connection-status"] {
  Status text */ html|span[id*="__addonRef__"][id*="connection-status"] {
  margin-left: 12px; font-size: 14px; font-weight: 500; } /* Footer help */
  html|label[data-l10n-id*="pref-help"] { font-size: 12px; color: #888;
  text-align: center; font-style: italic; display: block; margin-top: 24px;
  padding-top: 16px; border-top: 1px solid #eee; } /* Responsive */ @media
  (max-width: 720px) { .z2e-label { width: 100px; }
  html|input[id*="__addonRef__"] { width: 100%; max-width: 100%; } }
  ]]></html:style
>
